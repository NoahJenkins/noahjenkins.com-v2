name: Dependabot Auto-Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    name: Auto-approve and enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate auto-merge policy
        id: policy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          set -euo pipefail

          is_supported_ecosystem=false
          if [[ "$PACKAGE_ECOSYSTEM" == "npm" || "$PACKAGE_ECOSYSTEM" == "npm_and_yarn" || "$PACKAGE_ECOSYSTEM" == "github-actions" || "$PACKAGE_ECOSYSTEM" == "github_actions" ]]; then
            is_supported_ecosystem=true
          fi

          is_supported_update=false
          if [[ "$UPDATE_TYPE" == "version-update:semver-patch" || "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
            is_supported_update=true
          fi

          if [[ "$is_supported_ecosystem" != "true" || "$is_supported_update" != "true" ]]; then
            reason="Auto-closing: Dependabot update is outside the repository auto-merge policy (ecosystem=$PACKAGE_ECOSYSTEM, update_type=$UPDATE_TYPE)."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "should_close=true" >> "$GITHUB_OUTPUT"
            {
              echo "close_reason<<EOF"
              echo "$reason"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(gh api \
            "repos/$REPO/pulls/$PR_NUMBER/files" \
            --paginate \
            --jq '.[].filename')

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            reason="Auto-closing: Dependabot PR changed no files, so it cannot be auto-merged safely."
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "should_close=true" >> "$GITHUB_OUTPUT"
            {
              echo "close_reason<<EOF"
              echo "$reason"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${changed_files[@]}"; do
            if [[ "$file" == "package.json" || "$file" == "pnpm-lock.yaml" || "$file" =~ ^\.github/workflows/.+\.ya?ml$ ]]; then
              continue
            fi

            reason="Auto-closing: Dependabot PR touches files outside the allowed auto-merge scope ($file)."
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "should_close=true" >> "$GITHUB_OUTPUT"
            {
              echo "close_reason<<EOF"
              echo "$reason"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          done

          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "safe=true" >> "$GITHUB_OUTPUT"
          echo "should_close=false" >> "$GITHUB_OUTPUT"

      - name: Auto-approve Dependabot PR
        if: steps.policy.outputs.eligible == 'true' && steps.policy.outputs.safe == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                event: 'APPROVE',
                body: 'Auto-approved for Dependabot patch/minor update after policy checks.'
              })
            } catch (error) {
              if (error.status === 422) {
                core.info(`Review not created (422): ${error.message}`)
                core.info('This may mean the approval already exists, or Actions is not permitted to approve PRs (check Settings > Actions > General).')
              } else {
                throw error
              }
            }

      - name: Enable auto-merge
        if: steps.policy.outputs.eligible == 'true' && steps.policy.outputs.safe == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pullRequestId = context.payload.pull_request.node_id

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }`,
                { pullRequestId }
              )
            } catch (error) {
              core.warning(`Unable to enable auto-merge: ${error.message}`)
            }

      - name: Comment and close unsupported PR
        if: steps.policy.outputs.should_close == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          CLOSE_REASON: ${{ steps.policy.outputs.close_reason }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_number = context.payload.pull_request.number
            const body = process.env.CLOSE_REASON

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull_number,
              body
            })

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              state: 'closed'
            })
